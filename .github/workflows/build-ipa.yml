name: Build YTPlus IPA

on:
  workflow_dispatch:
    inputs:
      decrypted_ipa_url:
        description: "Decrypted YouTube IPA direct download URL"
        required: true
        type: string
      app_name:
        description: "App Name"
        required: true
        default: "YouTube"
        type: string
      bundle_id:
        description: "Bundle ID"
        required: true
        default: "com.google.ios.youtube"
        type: string
      # ── NEW ──────────────────────────────────────────────────────────────────
      # When false (default) the workflow uses only the .deb files already
      # committed to tweaks/ – no network access to repos, no building.
      # When true the workflow fetches the latest SHA for every enabled tweak,
      # rebuilds anything that has changed, and commits the updated cache back.
      update_tweaks:
        description: "Check for Tweak Updates"
        default: false
        type: boolean
      # ─────────────────────────────────────────────────────────────────────────
      enable_youpip:      { description: "YouPiP",                  default: true,  type: boolean }
      enable_ytuhd:       { description: "YTUHD",                   default: true,  type: boolean }
      enable_yq:          { description: "YouQuality",              default: true,  type: boolean }
      enable_ycq:         { description: "YouChooseQuality",        default: true,  type: boolean }
      enable_ryd:         { description: "Return YouTube Dislikes", default: true,  type: boolean }
      enable_ytabc:       { description: "YTABConfig",              default: true,  type: boolean }
      enable_demc:        { description: "DontEatMyContent",        default: true,  type: boolean }
      enable_youloop:     { description: "YouLoop",                 default: true,  type: boolean }
      enable_youspeed:    { description: "YouSpeed",                default: true,  type: boolean }
      enable_opensafari:  { description: "OpenYouTubeSafariExtension", default: true,  type: boolean }

concurrency:
  group: build-ytplus-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  THEOS: ${{ github.workspace }}/theos
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  HOMEBREW_NO_ANALYTICS: 1
  SDKVERSION: 16.5

jobs:
  build:
    name: Build YTPlus
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          fetch-tags: false

      # cyan is needed in every mode (injection step)
      - name: Cache cyan
        id: cyan-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/pipx
            ~/.local/bin/cyan
            ~/.local/bin/cgen
          key: cyan-pyzule-rw-${{ runner.os }}-v3

      # Theos is only needed when we are rebuilding tweaks from source
      - name: Cache Theos
        if: github.event.inputs.update_tweaks == 'true'
        id: theos-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.THEOS }}
          key: theos-${{ runner.os }}-sdk16.5-v2

      - name: Install Build Tools
        shell: bash
        run: |
          set -euo pipefail

          NEED_BREW=("")
          for pkg in make ldid dpkg; do
            brew list "$pkg" >/dev/null 2>&1 || NEED_BREW+=("$pkg")
          done

          # meson/ninja are only required when building YTUHD from source
          if [[ "${{ github.event.inputs.update_tweaks }}" == "true" && \
                "${{ github.event.inputs.enable_ytuhd }}"  == "true" ]]; then
            for pkg in meson ninja; do
              brew list "$pkg" >/dev/null 2>&1 || NEED_BREW+=("$pkg")
            done
          fi

          if [[ ${#NEED_BREW[@]} -gt 1 ]]; then
            NEED_BREW=("${NEED_BREW[@]:1}")
            brew install "${NEED_BREW[@]}"
          else
            echo "Homebrew tools already installed"
          fi
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

          if [[ "${{ steps.cyan-cache.outputs.cache-hit }}" != "true" ]]; then
            python3 -m pip install --upgrade pipx --break-system-packages 2>/dev/null || true
            python3 -m pipx ensurepath
            python3 -m pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          else
            echo "cyan cache hit"
          fi

          CYAN_PATH="$(python3 -m pipx environment --value PIPX_BIN_DIR 2>/dev/null || echo "$HOME/.local/bin")"
          echo "CYAN_BIN_DIR=$CYAN_PATH" >> "$GITHUB_ENV"
          echo "$CYAN_PATH" >> "$GITHUB_PATH"
          export PATH="$CYAN_PATH:$PATH"

          command -v cyan >/dev/null
          echo "cyan: $(command -v cyan)"

      - name: Download IPA and Setup Theos
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          URL="${{ github.event.inputs.decrypted_ipa_url }}"
          if [[ "$URL" == *"dropbox.com"* ]]; then
            URL="${URL/dl=0/dl=1}"
          fi

          # Start IPA download in the background while setting up Theos (update mode)
          curl -L --fail --retry 8 --retry-delay 5 --connect-timeout 30 \
            -A "Mozilla/5.0" "$URL" -o youtube.ipa &
          IPA_PID=$!

          if [[ "${{ github.event.inputs.update_tweaks }}" == "true" ]]; then
            if [[ "${{ steps.theos-cache.outputs.cache-hit }}" != "true" ]]; then
              git clone --depth 1 --recurse-submodules https://github.com/theos/theos.git "$THEOS"
              mkdir -p "$THEOS/sdks"
              git clone --quiet --depth 1 https://github.com/theos/sdks/ /tmp/theos-sdks
              mv /tmp/theos-sdks/iPhoneOS16.5.sdk "$THEOS/sdks/"
            else
              echo "Theos cache hit"
            fi
          else
            echo "Stable mode: Theos setup skipped"
          fi

          wait "$IPA_PID"
          test -s youtube.ipa
          echo "IPA downloaded: $(du -h youtube.ipa | awk '{print $1}')"

          # ── iPhone + iPad 통합 지원: UIDeviceFamily 2 추가 & UISupportedDevices 제거 ──
          echo "Patching Info.plist for iPhone + iPad support..."
          _PLIST_IN_IPA="$(unzip -Z1 youtube.ipa "Payload/*.app/Info.plist" 2>/dev/null | head -1 || true)"
          if [[ -n "$_PLIST_IN_IPA" ]]; then
            _IPAD_TMP="$(mktemp -d)"
            unzip -p youtube.ipa "$_PLIST_IN_IPA" > "$_IPAD_TMP/Info.plist"
            # 1) UIDeviceFamily에 iPad(2) 추가
            if ! /usr/libexec/PlistBuddy -c "Print UIDeviceFamily" "$_IPAD_TMP/Info.plist" 2>/dev/null | grep -q "^ *2$"; then
              _FAM_COUNT="$(/usr/libexec/PlistBuddy -c "Print UIDeviceFamily" "$_IPAD_TMP/Info.plist" 2>/dev/null | grep -c "Integer" || echo 1)"
              /usr/libexec/PlistBuddy -c "Add UIDeviceFamily:${_FAM_COUNT} integer 2" "$_IPAD_TMP/Info.plist" \
                && echo "  UIDeviceFamily: iPad(2) added" \
                || echo "  Warning: UIDeviceFamily patch failed"
            else
              echo "  UIDeviceFamily already includes iPad"
            fi
            # 2) UISupportedDevices 삭제 (iPhone 모델만 나열되어 iPad 설치를 차단하는 키)
            /usr/libexec/PlistBuddy -c "Delete UISupportedDevices" "$_IPAD_TMP/Info.plist" 2>/dev/null \
              && echo "  UISupportedDevices removed (iPad install unblocked)" \
              || echo "  UISupportedDevices not present, skipping"
            mkdir -p "$_IPAD_TMP/$(dirname "$_PLIST_IN_IPA")"
            cp "$_IPAD_TMP/Info.plist" "$_IPAD_TMP/$_PLIST_IN_IPA"
            (cd "$_IPAD_TMP" && zip -u "$GITHUB_WORKSPACE/youtube.ipa" "$_PLIST_IN_IPA")
            rm -rf "$_IPAD_TMP"
            echo "  IPA repacked: iPhone + iPad 모두 설치 가능"
          else
            echo "  Warning: Info.plist not found in IPA, skipping patch"
          fi
          # ─────────────────────────────────────────────────────────────────────

          PLIST_PATH="$(unzip -Z1 youtube.ipa "Payload/*.app/Info.plist" 2>/dev/null | head -1 || true)"
          YT_VERSION=""
          if [[ -n "$PLIST_PATH" ]]; then
            PLIST_TMP="$(mktemp)"
            unzip -p youtube.ipa "$PLIST_PATH" > "$PLIST_TMP"
            YT_VERSION="$(plutil -extract CFBundleShortVersionString raw "$PLIST_TMP" 2>/dev/null || true)"
            if [[ -z "$YT_VERSION" ]]; then
              YT_VERSION="$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$PLIST_TMP" 2>/dev/null || true)"
            fi
            rm -f "$PLIST_TMP"
          fi
          if [[ -z "$YT_VERSION" ]]; then
            YT_VERSION="$(echo "$URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | tail -1 || true)"
          fi
          [[ -n "$YT_VERSION" ]] || YT_VERSION="Unknown"

          echo "YouTube version: $YT_VERSION"
          echo "ipa_name=YTPlus_5.2.1_${YT_VERSION}.ipa"    >> "$GITHUB_OUTPUT"
          echo "release_name=YTPlus_5.2.1_${YT_VERSION}"    >> "$GITHUB_OUTPUT"
          echo "tag=YTPlus_5.2.1_${YT_VERSION}"             >> "$GITHUB_OUTPUT"

          TWEAK_LIST="YTPlus"
          [[ "${{ github.event.inputs.enable_ytabc }}"    == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYTABConfig"
          [[ "${{ github.event.inputs.enable_yq }}"       == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYouQuality"
          [[ "${{ github.event.inputs.enable_ycq }}"      == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYouChooseQuality"
          [[ "${{ github.event.inputs.enable_ryd }}"      == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nReturn YouTube Dislikes"
          [[ "${{ github.event.inputs.enable_demc }}"     == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nDontEatMyContent"
          [[ "${{ github.event.inputs.enable_youpip }}"   == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYouPiP"
          [[ "${{ github.event.inputs.enable_ytuhd }}"    == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYTUHD"
          [[ "${{ github.event.inputs.enable_youloop }}"  == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYouLoop"
          [[ "${{ github.event.inputs.enable_youspeed }}" == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYouSpeed"
          [[ "${{ github.event.inputs.enable_opensafari }}" == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nOpenYouTubeSafariExtension"

          {
            echo "release_notes<<EOF"
            echo "Updated to YouTube v${YT_VERSION}"
            echo ""
            echo "Included Tweaks:"
            echo ""
            echo -e "$TWEAK_LIST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ════════════════════════════════════════════════════════════════════════
      # PREPARE TWEAKS
      #
      # STABLE MODE  (update_tweaks = false, default)
      #   • Copy .deb files committed to tweaks/ → ready_packages/
      #   • Respects each enable_* flag so disabled tweaks are not injected
      #   • No network calls to GitHub repos, no Theos build
      #
      # UPDATE MODE  (update_tweaks = true)
      #   • Fetch latest commit SHA for every enabled tweak
      #   • Cache hit  → copy existing .deb from tweaks/
      #   • Cache miss → git clone → make package → save to tweaks/
      #   • Commit any new/updated .deb files back to the repo
      # ════════════════════════════════════════════════════════════════════════
      - name: Prepare Tweaks (Stable Mode)
        if: github.event.inputs.update_tweaks != 'true'
        shell: bash
        run: |
          set -euo pipefail

          CACHE_DIR="${{ github.workspace }}/tweaks"
          READY_DIR="${{ github.workspace }}/ready_packages"
          mkdir -p "$CACHE_DIR" "$READY_DIR"

          echo "=== STABLE MODE: using pinned .deb files from tweaks/ ==="

            # Deduplicate: for each tweak key keep only the newest file (by mtime).
            # Uses a temp dir instead of declare -A to stay compatible with all shells.
            DEDUP_DIR="$(mktemp -d)"

            tweak_key() {
              local f="$1"
              for k in YouGroupSettings YTVideoOverlay YouPiP YTUHD \
                        YouQuality YouChooseQuality Return-YouTube-Dislikes \
                        YTABConfigReset YTABConfig DontEatMyContent \
                        YouLoop YouSpeed libundirect; do
                [[ "$f" == *"$k"* ]] && { echo "$k"; return; }
              done
              echo "__other__:$f"
            }

            for deb in "$CACHE_DIR"/*.deb; do
              [[ -f "$deb" ]] || continue
              key="$(tweak_key "$(basename "$deb")")"
              # sanitize key for use as filename
              safe_key="${key//[^a-zA-Z0-9_-]/_}"
              slot="$DEDUP_DIR/$safe_key"
              if [[ -f "$slot" ]]; then
                existing="$(cat "$slot")"
                [[ "$deb" -nt "$existing" ]] && echo "$deb" > "$slot"
              else
                echo "$deb" > "$slot"
              fi
            done

            count=0
            for slot in "$DEDUP_DIR"/*; do
              [[ -f "$slot" ]] || continue
              deb="$(cat "$slot")"
              [[ -f "$deb" ]] || continue
              fname="$(basename "$deb")"

              # Skip debs whose feature flag is disabled.
              # Note: YTABConfigReset must be checked BEFORE YTABConfig.
              case "$fname" in
                *YTUHD*)
                  [[ "${{ github.event.inputs.enable_ytuhd }}"       == "true" ]] \
                    || { echo "  skip (disabled): $fname"; continue; } ;;
                *YouPiP*)
                  [[ "${{ github.event.inputs.enable_youpip }}"      == "true" ]] \
                    || { echo "  skip (disabled): $fname"; continue; } ;;
                *YouChooseQuality*)
                  [[ "${{ github.event.inputs.enable_ycq }}"         == "true" ]] \
                    || { echo "  skip (disabled): $fname"; continue; } ;;
                *YouQuality*)
                  [[ "${{ github.event.inputs.enable_yq }}"          == "true" ]] \
                    || { echo "  skip (disabled): $fname"; continue; } ;;
                *Return-YouTube-Dislikes*|*ReturnYouTubeDislikes*)
                  [[ "${{ github.event.inputs.enable_ryd }}"         == "true" ]] \
                    || { echo "  skip (disabled): $fname"; continue; } ;;
                *YTABConfigReset*)
                  [[ "${{ github.event.inputs.enable_ytabc_reset }}" == "true" ]] \
                    || { echo "  skip (disabled): $fname"; continue; } ;;
                *YTABConfig*)
                  [[ "${{ github.event.inputs.enable_ytabc }}"       == "true" ]] \
                    || { echo "  skip (disabled): $fname"; continue; } ;;
                *DontEatMyContent*)
                  [[ "${{ github.event.inputs.enable_demc }}"        == "true" ]] \
                    || { echo "  skip (disabled): $fname"; continue; } ;;
                *YouLoop*)
                  [[ "${{ github.event.inputs.enable_youloop }}"     == "true" ]] \
                    || { echo "  skip (disabled): $fname"; continue; } ;;
                *YouSpeed*)
                  [[ "${{ github.event.inputs.enable_youspeed }}"    == "true" ]] \
                    || { echo "  skip (disabled): $fname"; continue; } ;;
                # Always include: YouGroupSettings, YTVideoOverlay, libundirect, etc.
              esac

              cp "$deb" "$READY_DIR/"
              echo "  copied $fname"
              count=$((count + 1))
            done
            # .appex 복사 (enable_opensafari가 true일 때만)
            if [[ "${{ github.event.inputs.enable_opensafari }}" == "true" ]]; then
              for appex_zip in "$CACHE_DIR"/*.appex.zip; do
                [[ -f "$appex_zip" ]] || continue
                unzip -o "$appex_zip" -d "$READY_DIR/"
                echo "  unzipped $(basename "$appex_zip")"
              done
              for appex in "$CACHE_DIR"/*.appex; do
                [[ -f "$appex" ]] || continue
                cp "$appex" "$READY_DIR/"
                echo "  copied $(basename "$appex")"
              done
            fi


            if [[ "$count" -eq 0 ]]; then
              echo "ERROR: No .deb files found in tweaks/."
              echo "Run this workflow once with 'Check for Tweak Updates' enabled to populate the cache."
              exit 1
            fi

            echo "CACHE_UPDATED=false" >> "$GITHUB_ENV"

      - name: Prepare Tweaks (Update Mode)
        if: github.event.inputs.update_tweaks == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          CACHE_DIR="${{ github.workspace }}/tweaks"
          BUILD_DIR="${{ github.workspace }}/tweaks-build"
          READY_DIR="${{ github.workspace }}/ready_packages"
          SHA_STORE="$(mktemp -d)"
          mkdir -p "$CACHE_DIR" "$BUILD_DIR" "$READY_DIR"
          CACHE_UPDATED=false

          echo "=== UPDATE MODE: checking for tweak updates ==="

          REPOS=(
            "YouTubeHeader|https://github.com/PoomSmart/YouTubeHeader.git|true"
            "PSHeader|https://github.com/PoomSmart/PSHeader.git|true"
            "YTVideoOverlay|https://github.com/PoomSmart/YTVideoOverlay.git|true"
            "DontEatMyContent|https://github.com/therealFoxster/DontEatMyContent.git|${{ github.event.inputs.enable_demc }}"
            "YouPiP|https://github.com/PoomSmart/YouPiP.git|${{ github.event.inputs.enable_youpip }}"
            "YouQuality|https://github.com/PoomSmart/YouQuality.git|${{ github.event.inputs.enable_yq }}"
            "YouChooseQuality|https://github.com/PoomSmart/YouChooseQuality.git|${{ github.event.inputs.enable_ycq }}"
            "Return-YouTube-Dislikes|https://github.com/PoomSmart/Return-YouTube-Dislikes.git|${{ github.event.inputs.enable_ryd }}"
            "YouLoop|https://github.com/bhackel/YouLoop.git|${{ github.event.inputs.enable_youloop }}"
            "YouSpeed|https://github.com/PoomSmart/YouSpeed.git|${{ github.event.inputs.enable_youspeed }}"
            "YTUHD|https://github.com/PoomSmart/YTUHD.git|${{ github.event.inputs.enable_ytuhd }}"
          )

          HEADER_ONLY="YouTubeHeader PSHeader"

          # ── helper: download latest .deb from a Cydia/APT repo ──────────
          cache_repo_deb() {
            local base_url="$1" package_id="$2" cache_name="$3" output_name="$4"
            local packages_file file_url cache_key cached target

            packages_file="$(mktemp)"
            curl -fsSL --retry 5 "${base_url%/}/Packages" -o "$packages_file"
            file_url="$(
              awk -v pkg="$package_id" '
                BEGIN { RS=""; FS="\n" }
                {
                  package_name = architecture = filename = ""
                  for (i = 1; i <= NF; i++) {
                    if ($i ~ /^Package: /)      package_name = substr($i, 10)
                    if ($i ~ /^Architecture: /) architecture = substr($i, 15)
                    if ($i ~ /^Filename: /)     filename     = substr($i, 11)
                  }
                  if (package_name == pkg && architecture == "iphoneos-arm") {
                    print filename; exit
                  }
                }
              ' "$packages_file"
            )"
            rm -f "$packages_file"

            if [[ -z "$file_url" ]]; then
              echo "Could not find ${package_id} in ${base_url}/Packages"; return 1
            fi
            [[ "$file_url" == http* ]] || file_url="${base_url%/}/${file_url#./}"
            cache_key="$(printf "%s" "$file_url" | shasum -a 256 | awk '{print substr($1,1,12)}')"
            cached="$(find "$CACHE_DIR" -maxdepth 1 -name "${cache_name}_repo_${cache_key}.deb" -print -quit 2>/dev/null || true)"
            target="$READY_DIR/$output_name"

            if [[ -n "$cached" ]]; then
              echo "  repo cache hit $cache_name ($cache_key)"
              cp "$cached" "$target"
            else
              echo "  repo changed $cache_name ($cache_key), downloading"
              curl -fL --retry 5 "$file_url" -o "$target"
              rm -f "$CACHE_DIR/${cache_name}_repo_"*.deb
              cp "$target" "$CACHE_DIR/${cache_name}_repo_${cache_key}.deb"
              touch "$SHA_STORE/CACHE_UPDATED"
            fi
          }

          # ── helper: download a pinned version from a Cydia/APT repo ─────
          cache_repo_deb_version() {
            local base_url="$1" package_id="$2" wanted_version="$3" cache_name="$4" output_name="$5"
            local packages_file file_url cache_key cached target

            packages_file="$(mktemp)"
            curl -fsSL --retry 5 "${base_url%/}/Packages" -o "$packages_file"
            file_url="$(
              awk -v pkg="$package_id" -v ver="$wanted_version" '
                BEGIN { RS=""; FS="\n"; selected = "" }
                {
                  package_name = architecture = version = filename = ""
                  for (i = 1; i <= NF; i++) {
                    if ($i ~ /^Package: /)      package_name = substr($i, 10)
                    if ($i ~ /^Version: /)      version      = substr($i, 10)
                    if ($i ~ /^Architecture: /) architecture = substr($i, 15)
                    if ($i ~ /^Filename: /)     filename     = substr($i, 11)
                  }
                  if (package_name == pkg && version == ver && architecture == "iphoneos-arm") {
                    selected = filename
                  }
                }
                END { print selected }
              ' "$packages_file"
            )"
            rm -f "$packages_file"

            if [[ -z "$file_url" ]]; then
              echo "Could not find ${package_id} ${wanted_version} in ${base_url}/Packages"; return 1
            fi
            [[ "$file_url" == http* ]] || file_url="${base_url%/}/${file_url#./}"
            cache_key="$(printf "%s|%s" "$file_url" "$wanted_version" | shasum -a 256 | awk '{print substr($1,1,12)}')"
            cached="$(find "$CACHE_DIR" -maxdepth 1 -name "${cache_name}_${wanted_version}_repo_${cache_key}.deb" -print -quit 2>/dev/null || true)"
            target="$READY_DIR/$output_name"

            if [[ -n "$cached" ]]; then
              echo "  pinned repo cache hit $cache_name $wanted_version ($cache_key)"
              cp "$cached" "$target"
            else
              echo "  pinned repo cache miss $cache_name $wanted_version ($cache_key), downloading"
              curl -fL --retry 5 "$file_url" -o "$target"
              rm -f "$CACHE_DIR/${cache_name}_"*_repo_*.deb
              cp "$target" "$CACHE_DIR/${cache_name}_${wanted_version}_repo_${cache_key}.deb"
              touch "$SHA_STORE/CACHE_UPDATED"
            fi
          }

          echo "Copy local patched debs"
          for deb in "$CACHE_DIR"/*.deb; do
            [[ -f "$deb" ]] || continue
            fname="$(basename "$deb" .deb)"
            sha_part="${fname##*_}"
            # Skip auto-managed debs (built from source or downloaded from repo)
            if [[ "$fname" == *_repo_* || "$fname" == *_direct_* \
                  || "$sha_part" =~ ^[0-9a-fA-F]{8}$  \
                  || "$sha_part" =~ ^[0-9a-fA-F]{12}$ \
                  || "$sha_part" =~ ^[0-9a-fA-F]{40}$ ]]; then
              continue
            fi
            # YouGroupSettings is always supplied by cache_repo_deb_version below;
            # skip any copy here to prevent duplicates.
            if [[ "$(basename "$deb")" == *YouGroupSettings* ]]; then
              echo "  skip (managed by repo): $(basename "$deb")"
              continue
            fi
            cp "$deb" "$READY_DIR/"
            echo "  copied $(basename "$deb")"
          done

          echo "Prepare pinned YouGroupSettings dependency"
          cache_repo_deb_version "https://repo.chariz.com" "com.ps.yougroupsettings" \
            "1.0.7" "YouGroupSettings" "YouGroupSettings_1.0.7.deb"

          if [[ "${{ github.event.inputs.enable_ytabc }}" == "true" ]]; then
            echo "Prepare official YTABConfig deb"
            cache_repo_deb "https://poomsmart.github.io/repo" "com.ps.ytabconfig" \
              "YTABConfig" "YTABConfig_official.deb"
            if [[ "${{ github.event.inputs.enable_ytabc_reset }}" == "true" ]]; then
              echo "Prepare YTABConfigReset deb"
              cache_repo_deb "https://poomsmart.github.io/repo" "com.ps.ytabconfigreset" \
                "YTABConfigReset" "YTABConfigReset_official.deb"
            fi
          fi

          echo "Fetch latest SHAs"
          SHA_PIDS=("")
          for repo in "${REPOS[@]}"; do
            NAME="${repo%%|*}"; rest="${repo#*|}"; URL="${rest%%|*}"; ENABLED="${rest#*|}"
            [[ "$ENABLED" == "true" ]] || continue
            REPO_PATH="$(echo "$URL" | sed 's|https://github.com/||;s|\.git$||')"
            (
              YTUHD_REF="${{ github.event.inputs.ytuhd_ref }}"
              if [[ "$NAME" == "YTUHD" && -n "$YTUHD_REF" && "$YTUHD_REF" != "master" ]]; then
                SHA="$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
                  "https://api.github.com/repos/$REPO_PATH/commits/$YTUHD_REF" \
                  | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'][:8])" 2>/dev/null || echo unknown)"
              else
                SHA="$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
                  "https://api.github.com/repos/$REPO_PATH/commits?per_page=1" \
                  | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['sha'][:8])" 2>/dev/null || echo unknown)"
              fi
              echo "$SHA" > "$SHA_STORE/${NAME}.sha"
            ) &
            SHA_PIDS+=("$!")
          done
          for pid in "${SHA_PIDS[@]}"; do [[ -n "$pid" ]] || continue; wait "$pid" || true; done

          echo "Resolve cache and clone misses"
          CLONE_PIDS=(""); CLONE_LIST=("")
          for repo in "${REPOS[@]}"; do
            NAME="${repo%%|*}"; rest="${repo#*|}"; URL="${rest%%|*}"; ENABLED="${rest#*|}"
            if [[ "$ENABLED" != "true" ]]; then echo "  skip $NAME"; continue; fi

            LATEST_SHA="$(cat "$SHA_STORE/${NAME}.sha" 2>/dev/null || echo unknown)"

            if echo "$HEADER_ONLY" | grep -qw "$NAME"; then
              CACHED="$(find "$CACHE_DIR" -maxdepth 1 -name "${NAME}_${LATEST_SHA}.tar" -print -quit 2>/dev/null || true)"
              if [[ -n "$CACHED" && "$LATEST_SHA" != "unknown" ]]; then
                echo "  header cache hit $NAME ($LATEST_SHA)"
                mkdir -p "$BUILD_DIR/$NAME"
                tar -xf "$CACHED" -C "$BUILD_DIR/$NAME"
              else
                echo "  clone header $NAME ($LATEST_SHA)"
                git clone --quiet --depth 1 --recurse-submodules "$URL" "$BUILD_DIR/$NAME" &
                CLONE_PIDS+=("$!"); CLONE_LIST+=("$NAME")
              fi
            else
              CACHED="$(find "$CACHE_DIR" -maxdepth 1 -name "${NAME}_${LATEST_SHA}.deb" -print -quit 2>/dev/null || true)"
              if [[ -n "$CACHED" && "$LATEST_SHA" != "unknown" ]]; then
                echo "  deb cache hit $NAME ($LATEST_SHA)"
                cp "$CACHED" "$READY_DIR/"
                # YTVideoOverlay needs its source for header imports even on cache hit
                if [[ "$NAME" == "YTVideoOverlay" ]]; then
                  echo "  clone YTVideoOverlay source for header imports (deb cache hit)"
                  git clone --quiet --depth 1 "$URL" "$BUILD_DIR/$NAME" &
                  CLONE_PIDS+=("$!")
                fi
              else
                echo "  clone $NAME ($LATEST_SHA)"
                YTUHD_REF="${{ github.event.inputs.ytuhd_ref }}"
                if [[ "$NAME" == "YTUHD" && -n "$YTUHD_REF" && "$YTUHD_REF" != "master" ]]; then
                  git clone --quiet --depth 1 --branch "$YTUHD_REF" \
                    --recurse-submodules "$URL" "$BUILD_DIR/$NAME" &
                else
                  git clone --quiet --depth 1 --recurse-submodules "$URL" "$BUILD_DIR/$NAME" &
                fi
                CLONE_PIDS+=("$!"); CLONE_LIST+=("$NAME")
              fi
            fi
          done
          for pid in "${CLONE_PIDS[@]}"; do [[ -n "$pid" ]] || continue; wait "$pid" || true; done

          if [[ -d "$BUILD_DIR/YouTubeHeader" ]]; then
            mkdir -p "$THEOS/include/YouTubeHeader"
            rsync -a --exclude='.git' "$BUILD_DIR/YouTubeHeader/" "$THEOS/include/YouTubeHeader/"
            rsync -a --exclude='.git' "$BUILD_DIR/YouTubeHeader/" "$THEOS/include/"
          fi
          if [[ -d "$BUILD_DIR/PSHeader" ]]; then
            rm -rf "$BUILD_DIR/PSHeader/CoreImage"
            mkdir -p "$THEOS/include/PSHeader"
            rsync -a --exclude='.git' "$BUILD_DIR/PSHeader/" "$THEOS/include/PSHeader/"
            rsync -a --exclude='.git' "$BUILD_DIR/PSHeader/" "$THEOS/include/"
          fi

          if [[ -d "$BUILD_DIR/DontEatMyContent" ]]; then
            sed -i '' "s/^CGFloat constant;/extern CGFloat constant;/" \
              "$BUILD_DIR/DontEatMyContent/Tweak.h" 2>/dev/null || true
            perl -0pi -e 's/#import "Tweak\.h"\n/#import "Tweak.h"\nCGFloat constant = 0;\n/' \
              "$BUILD_DIR/DontEatMyContent/Tweak.x" 2>/dev/null || true
          fi

          export DEBUG=0 FINALPACKAGE=1 SIDELOAD=1 SDKVERSION=16.5
          BUILD_PIDS=("")
          for NAME in "${CLONE_LIST[@]}"; do
            [[ -n "$NAME" ]] || continue
            DIR="$BUILD_DIR/$NAME"
            SHA="$(cat "$SHA_STORE/${NAME}.sha" 2>/dev/null || echo unknown)"

            if echo "$HEADER_ONLY" | grep -qw "$NAME"; then
              if [[ -d "$DIR" && "$SHA" != "unknown" ]]; then
                rm -f "$CACHE_DIR/${NAME}_"*.tar
                tar -cf "$CACHE_DIR/${NAME}_${SHA}.tar" -C "$DIR" --exclude='.git' .
                touch "$SHA_STORE/CACHE_UPDATED"
              fi
              continue
            fi

            [[ -d "$DIR" ]] || continue
            (
              if [[ "$NAME" == "YTUHD" ]]; then
                if [[ -d "$DIR/vendor/libvpx" && ! -f "$DIR/vendor/libvpx_ios/libvpx.a" ]]; then
                  echo "  building YTUHD libvpx..."
                  pushd "$DIR/vendor/libvpx" >/dev/null
                  make distclean >/dev/null 2>&1 || true
                  ./configure --target=arm64-darwin-gcc \
                    --disable-examples --disable-tools --disable-docs \
                    --disable-unit-tests --disable-webm-io \
                    --enable-vp9-decoder --enable-pic > /tmp/build_YTUHD_libvpx.log 2>&1
                  make -j"$(sysctl -n hw.ncpu)" libvpx.a >> /tmp/build_YTUHD_libvpx.log 2>&1
                  mkdir -p "$DIR/vendor/libvpx_ios"
                  cp libvpx.a "$DIR/vendor/libvpx_ios/libvpx.a"
                  popd >/dev/null
                fi

                if [[ -d "$DIR/vendor/dav1d" && ! -f "$DIR/vendor/dav1d_ios/libdav1d.a" ]]; then
                  echo "  building YTUHD dav1d..."
                  SDK_PATH="$(xcrun --sdk iphoneos --show-sdk-path)"
                  CLANG_PATH="$(xcrun --sdk iphoneos --find clang)"
                  AR_PATH="$(xcrun --sdk iphoneos --find ar)"
                  STRIP_PATH="$(xcrun --sdk iphoneos --find strip)"
                  CROSS_FILE="$DIR/vendor/dav1d/ios-arm64-cross.txt"
                  {
                    echo "[binaries]"
                    echo "c = '$CLANG_PATH'"
                    echo "ar = '$AR_PATH'"
                    echo "strip = '$STRIP_PATH'"
                    echo ""
                    echo "[host_machine]"
                    echo "system = 'darwin'"
                    echo "cpu_family = 'aarch64'"
                    echo "cpu = 'arm64'"
                    echo "endian = 'little'"
                    echo ""
                    echo "[built-in options]"
                    echo "c_args = ['-arch', 'arm64', '-isysroot', '$SDK_PATH', '-miphoneos-version-min=11.0']"
                    echo "c_link_args = ['-arch', 'arm64', '-isysroot', '$SDK_PATH', '-miphoneos-version-min=11.0']"
                  } > "$CROSS_FILE"

                  rm -rf "$DIR/vendor/dav1d/build-ios"
                  meson setup "$DIR/vendor/dav1d/build-ios" "$DIR/vendor/dav1d" \
                    --cross-file "$CROSS_FILE" \
                    --default-library static \
                    -Denable_tools=false \
                    -Denable_tests=false \
                    -Denable_examples=false \
                    -Denable_docs=false \
                    -Denable_asm=false > /tmp/build_YTUHD_dav1d.log 2>&1
                  ninja -C "$DIR/vendor/dav1d/build-ios" >> /tmp/build_YTUHD_dav1d.log 2>&1
                  mkdir -p "$DIR/vendor/dav1d_ios"
                  DAV1D_LIB="$(find "$DIR/vendor/dav1d/build-ios" -name "libdav1d.a" -print -quit)"
                  if [[ -z "$DAV1D_LIB" ]]; then
                    echo "  dav1d build did not produce libdav1d.a"
                    tail -80 /tmp/build_YTUHD_dav1d.log || true
                    exit 1
                  fi
                  cp "$DAV1D_LIB" "$DIR/vendor/dav1d_ios/libdav1d.a"
                fi
              fi

              pushd "$DIR" >/dev/null
              if [[ -f Makefile ]]; then
                make clean >/dev/null 2>&1 || true
                if make -j"$(sysctl -n hw.ncpu)" package >"/tmp/build_${NAME}.log" 2>&1; then
                  for deb in packages/*.deb; do
                    [[ -f "$deb" ]] || continue
                    cp "$deb" "$READY_DIR/"
                    if [[ "$SHA" != "unknown" ]]; then
                      rm -f "$CACHE_DIR/${NAME}_"*.deb
                      cp "$deb" "$CACHE_DIR/${NAME}_${SHA}.deb"
                      touch "$SHA_STORE/CACHE_UPDATED"
                    fi
                  done
                  echo "  built $NAME"
                else
                  echo "  build failed $NAME"
                  tail -40 "/tmp/build_${NAME}.log"
                  exit 1
                fi
              fi
              popd >/dev/null
            ) &
            BUILD_PIDS+=("$!")
          done
          for pid in "${BUILD_PIDS[@]}"; do [[ -n "$pid" ]] || continue; wait "$pid"; done

          [[ -f "$SHA_STORE/CACHE_UPDATED" ]] && CACHE_UPDATED=true
          echo "CACHE_UPDATED=$CACHE_UPDATED" >> "$GITHUB_ENV"

          # ── validation ────────────────────────────────────────────────────
          echo "Ready debs"
          ls -lh "$READY_DIR/"
          DEB_COUNT="$(find "$READY_DIR" -name "*.deb" | wc -l | tr -d ' ')"
          if [[ "$DEB_COUNT" -eq 0 ]]; then
          echo "No deb files to inject"; exit 1
          fi
          YGS_COUNT="$(find "$READY_DIR" -name "*YouGroupSettings*.deb" | wc -l | tr -d ' ')"
          if [[ "$YGS_COUNT" -ne 1 ]]; then
          echo "Expected exactly one YouGroupSettings deb, found $YGS_COUNT"
          find "$READY_DIR" -name "*YouGroupSettings*.deb" -print
          exit 1
          fi
          if [[ "${{ github.event.inputs.enable_ytabc_reset }}" != "true" ]]; then
          RESET_COUNT="$(find "$READY_DIR" -name "*YTABConfigReset*.deb" | wc -l | tr -d ' ')"
          if [[ "$RESET_COUNT" -ne 0 ]]; then
            echo "YTABConfigReset is disabled but still present in ready packages"
            find "$READY_DIR" -name "*YTABConfigReset*.deb" -print
            exit 1
          fi
          fi
          if [[ "${{ github.event.inputs.enable_ytuhd }}" == "true" ]] && \
           ! find "$READY_DIR" \( -name "YTUHD*.deb" -o -name "com.ps.ytuhd*.deb" \) \
               -print -quit | grep -q .; then
          echo "YTUHD is enabled but no YTUHD deb is ready"
          exit 1
          fi

      - name: Commit Updated Tweak Cache
        if: env.CACHE_UPDATED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tweaks/
          git diff --cached --quiet && exit 0
          git commit -m "chore: update tweak cache [skip ci]"
          git push

      - name: Inject
        shell: bash
        run: |
          set -euo pipefail
          CYAN="$CYAN_BIN_DIR/cyan"
          if [[ ! -x "$CYAN" ]]; then
            echo "cyan not found: $CYAN"; exit 1
          fi

          ALL_DEBS_FILE="$(mktemp)"
          find "${{ github.workspace }}/ready_packages" \( -name "*.deb" -o -name "*.appex" \) | sort > "$ALL_DEBS_FILE"

          # Build injection order: priority packages first, then the rest
          DEBS=("")
          for pattern in "libundirect" "YouGroupSettings" "YTVideoOverlay" "YTABConfig" "YTABConfigReset"; do
            while IFS= read -r deb; do
              [[ -n "$deb" ]] || continue
              DEBS+=("$deb")
            done < <(grep "/.*${pattern}.*\.deb$" "$ALL_DEBS_FILE" || true)
          done
          while IFS= read -r deb; do
            [[ -n "$deb" ]] || continue
            case "$(basename "$deb")" in
              *libundirect*.deb|*YouGroupSettings*.deb|*YTVideoOverlay*.deb|\
              *YTABConfig*.deb|*YTABConfigReset*.deb) continue ;;
            esac
            DEBS+=("$deb")
          done < "$ALL_DEBS_FILE"
          rm -f "$ALL_DEBS_FILE"

          DEBS=("${DEBS[@]:1}")
          if [[ ${#DEBS[@]} -eq 0 ]]; then
            echo "No deb files found for injection"; exit 1
          fi
          printf "Injecting debs:\n"
          printf "  %s\n" "${DEBS[@]}"

          "$CYAN" \
            -i ./youtube.ipa \
            -o "${{ steps.meta.outputs.ipa_name }}" \
            -f "${DEBS[@]}" \
            -e \
            -n "${{ github.event.inputs.app_name }}" \
            -b "${{ github.event.inputs.bundle_id }}"

          test -s "${{ steps.meta.outputs.ipa_name }}"
          echo "IPA complete: ${{ steps.meta.outputs.ipa_name }}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name:     ${{ steps.meta.outputs.release_name }}
          body:     ${{ steps.meta.outputs.release_notes }}
          files:    ${{ steps.meta.outputs.ipa_name }}
          overwrite_files: true
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          
