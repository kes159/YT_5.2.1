name: Build YTPlus IPA

on:
  workflow_dispatch:
    inputs:
      decrypted_ipa_url:
        description: 'Decrypted YouTube IPA direct download URL'
        required: true
        type: string

      # ── 기본 설정 ──────────────────────────────────────────
      ytplus_version:
        description: 'YTPlus Tweak Version'
        required: true
        default: '5.2.1'
        type: string

      app_name:
        description: 'App Name (Optional)'
        required: true
        default: 'YouTube'
        type: string

      bundle_id:
        description: 'BundleID (Optional)'
        required: true
        default: 'com.google.ios.youtube'
        type: string

      # ── 트윅 선택 ──────────────────────────────────────────
      enable_youpip:
        description: 'YouPiP'
        required: false
        default: true
        type: boolean

      enable_ytuhd:
        description: 'YTUHD'
        required: false
        default: true
        type: boolean

      enable_yq:
        description: 'YouQuality'
        required: false
        default: true
        type: boolean

      enable_ycq:
        description: 'YouChooseQuality'
        required: false
        default: true
        type: boolean

      enable_ryd:
        description: 'Return YouTube Dislikes'
        required: false
        default: true
        type: boolean

      enable_ytabc:
        description: 'YTABConfig'
        required: false
        default: true
        type: boolean

      enable_demc:
        description: 'DontEatMyContent'
        required: false
        default: true
        type: boolean

      enable_youloop:
        description: 'YouLoop'
        required: false
        default: true
        type: boolean

      enable_youspeed:
        description: 'YouSpeed'
        required: false
        default: true
        type: boolean

      include_open_youtube:
        description: 'Open in YouTube Safari extension'
        required: false
        default: true
        type: boolean
      # ───────────────────────────────────────────────────────
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build YTPlus IPA
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      # ── 1. 버전 추출 ────────────────────────────────────────
      - name: Extract YouTube version from URL
        id: version
        run: |
          URL="${{ github.event.inputs.decrypted_ipa_url }}"
          YT_VERSION=$(echo "$URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [[ -z "$YT_VERSION" ]]; then
            echo "❌ URL에서 유튜브 버전을 찾을 수 없습니다."
            exit 1
          fi
          echo "✅ YouTube 버전: $YT_VERSION"
          echo "yt_version=$YT_VERSION"                   >> "$GITHUB_OUTPUT"
          YTLITE_VER="${{ github.event.inputs.ytplus_version }}"
          echo "ipa_name=YTPlus_${YTLITE_VER}_${YT_VERSION}.ipa" >> "$GITHUB_OUTPUT"
          echo "release_tag=YTPlus_${YTLITE_VER}_${YT_VERSION}"  >> "$GITHUB_OUTPUT"
          echo "ytplus_version=${YTLITE_VER}"                     >> "$GITHUB_OUTPUT"

      # ── 2. 저장소 체크아웃 ─────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 3. 의존성 설치 ─────────────────────────────────────
      - name: Install dependencies
        run: |
          brew install make ldid dpkg wget
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      # ── 4. Theos 캐시 ──────────────────────────────────────
      - name: Cache Theos
        id: theos
        uses: actions/cache@v4
        env:
          cache-name: theos_cache_9bc7340
        with:
          path: theos/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      # ── 5. Theos 설치 ──────────────────────────────────────
      - name: Setup Theos
        if: steps.theos.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 9bc73406cf80b711ef4d02c15ff1dedc4478a275
          path: theos
          submodules: recursive

      # ── 6. iOS SDK 설치 ────────────────────────────────────
      - name: Download iOS SDK
        if: steps.theos.outputs.cache-hit != 'true'
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv *.sdk ${{ github.workspace }}/theos/sdks

      # ── 7. cyan 설치 ───────────────────────────────────────
      - name: Install cyan
        run: |
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      # ── 8. IPA 다운로드 ────────────────────────────────────
      - name: Download decrypted YouTube IPA
        run: |
          wget "${{ github.event.inputs.decrypted_ipa_url }}" --no-verbose -O youtube.ipa

      # ── 9. YTLite deb 다운로드 ─────────────────────────────
      - name: Download YTLite deb
        run: |
          YTLITE_VER="${{ github.event.inputs.ytplus_version }}"
          wget "https://github.com/dayanch96/YTLite/releases/download/v${YTLITE_VER}/com.dvntm.ytlite_${YTLITE_VER}_iphoneos-arm.deb" \
            --no-verbose -O ytplus.deb

      # ── 10. 공통 헤더 클론 ─────────────────────────────────
      - name: Clone shared headers
        run: |
          THEOS=${{ github.workspace }}/theos
          cd $THEOS/include
          rm -rf YouTubeHeader PSHeader YTHeaders
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git
          git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git
          if [[ "${{ github.event.inputs.enable_demc }}" == "true" ]]; then
            cp -r YouTubeHeader YTHeaders
          fi

      # ── 11. 트윅 클론 ──────────────────────────────────────
      - name: Clone YouGroupSettings
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ycq || inputs.enable_ryd || inputs.enable_demc || inputs.enable_youloop || inputs.enable_youspeed }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouGroupSettings.git

      - name: Clone YTVideoOverlay
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ycq || inputs.enable_youloop || inputs.enable_youspeed }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoOverlay.git

      - name: Clone YouPiP
        if: ${{ inputs.enable_youpip }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouPiP.git

      - name: Clone YTUHD
        if: ${{ inputs.enable_ytuhd }}
        run: |
          git clone --quiet --depth=1 --recurse-submodules https://github.com/PoomSmart/YTUHD.git
          # libvpx 헤더를 Theos include에 복사
          mkdir -p ${{ github.workspace }}/theos/include/vpx
          cp YTUHD/vendor/libvpx/vpx/*.h ${{ github.workspace }}/theos/include/vpx/
          # libvpx를 iOS arm64용으로 빌드
          mkdir -p YTUHD/vendor/libvpx_ios
          cd YTUHD/vendor/libvpx
          ./configure \
            --target=arm64-darwin-gcc \
            --disable-examples --disable-tools --disable-docs \
            --disable-unit-tests --disable-vp8 \
            --disable-vp9-encoder --enable-vp9-decoder \
            --enable-pic
          make -j$(sysctl -n hw.ncpu) libvpx.a
          cp libvpx.a ../libvpx_ios/libvpx.a

      - name: Clone YouQuality
        if: ${{ inputs.enable_yq }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouQuality.git

      - name: Clone YouChooseQuality
        if: ${{ inputs.enable_ycq }}
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouChooseQuality.git
          # 한국어 로컬라이제이션 주입
          YCQ_BUNDLE=$(find YouChooseQuality/layout -type d -name "*.bundle" 2>/dev/null | head -1)
          if [[ -n "$YCQ_BUNDLE" ]]; then
            mkdir -p "$YCQ_BUNDLE/ko.lproj"
            cat > "$YCQ_BUNDLE/ko.lproj/Localizable.strings" << 'KOEOF'
          "TWEAK_NAME" = "YouChooseQuality";
          "TWEAK_DESC" = "각 상황별로 지정한 화질과 동일하거나 가장 가까운 화질을 자동으로 선택합니다.";
          "ENABLED" = "활성화";
          "QUALITY_FOR_SCENARIO_0_SHORT" = "Wi-Fi";
          "QUALITY_FOR_SCENARIO_0" = "Wi-Fi 연결 시 기본 화질";
          "QUALITY_FOR_SCENARIO_1_SHORT" = "셀룰러";
          "QUALITY_FOR_SCENARIO_1" = "셀룰러(모바일 데이터) 연결 시 기본 화질";
          "QUALITY_FOR_SCENARIO_2_SHORT" = "Wi-Fi (AirPlay)";
          "QUALITY_FOR_SCENARIO_2" = "AirPlay 사용 중 Wi-Fi 연결 시 기본 화질";
          "QUALITY_FOR_SCENARIO_3_SHORT" = "셀룰러 (AirPlay)";
          "QUALITY_FOR_SCENARIO_3" = "AirPlay 사용 중 셀룰러 연결 시 기본 화질";
          "QUALITY_FOR_SCENARIO_4_SHORT" = "저전력 모드";
          "QUALITY_FOR_SCENARIO_4" = "저전력 모드 활성화 시 기본 화질";
          KOEOF
          fi

      - name: Clone Return-YouTube-Dislikes
        if: ${{ inputs.enable_ryd }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/Return-YouTube-Dislikes.git

      - name: Clone YTABConfig
        if: ${{ inputs.enable_ytabc }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTABConfig.git

      - name: Clone DontEatMyContent
        if: ${{ inputs.enable_demc }}
        run: |
          git clone --quiet --depth=1 https://github.com/therealFoxster/DontEatMyContent.git
          sed -i '' "s/^CGFloat constant;/extern CGFloat constant;/" DontEatMyContent/Tweak.h
          perl -i -0pe 's/^(static CGFloat videoAspectRatio)/CGFloat constant = 0.0;\n$1/m' DontEatMyContent/Tweak.x

      - name: Clone YouLoop
        if: ${{ inputs.enable_youloop }}
        run: git clone --quiet --depth=1 https://github.com/bhackel/YouLoop.git

      - name: Clone YouSpeed
        if: ${{ inputs.enable_youspeed }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouSpeed.git

      # ── 12. 트윅 빌드 ──────────────────────────────────────
      - name: Build YouGroupSettings
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ycq || inputs.enable_ryd || inputs.enable_demc || inputs.enable_youloop || inputs.enable_youspeed }}
        run: |
          export THEOS=${{ github.workspace }}/theos
          cd YouGroupSettings && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../ygs.deb

      - name: Build YTVideoOverlay
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ycq || inputs.enable_youloop || inputs.enable_youspeed }}
        run: |
          export THEOS=${{ github.workspace }}/theos
          cd YTVideoOverlay && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../ytvo.deb

      - name: Build YouPiP
        if: ${{ inputs.enable_youpip }}
        run: |
          export THEOS=${{ github.workspace }}/theos
          cd YouPiP && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../youpip.deb

      - name: Build YTUHD
        if: ${{ inputs.enable_ytuhd }}
        run: |
          export THEOS=${{ github.workspace }}/theos
          cd YTUHD && make clean package DEBUG=0 FINALPACKAGE=1 SIDELOAD=1
          mv packages/*.deb ../ytuhd.deb

      - name: Build YouQuality
        if: ${{ inputs.enable_yq }}
        run: |
          export THEOS=${{ github.workspace }}/theos
          cd YouQuality && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../yq.deb

      - name: Build YouChooseQuality
        if: ${{ inputs.enable_ycq }}
        run: |
          export THEOS=${{ github.workspace }}/theos
          cd YouChooseQuality && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../ycq.deb

      - name: Build Return-YouTube-Dislikes
        if: ${{ inputs.enable_ryd }}
        run: |
          export THEOS=${{ github.workspace }}/theos
          cd Return-YouTube-Dislikes && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../ryd.deb

      - name: Build YTABConfig
        if: ${{ inputs.enable_ytabc }}
        run: |
          export THEOS=${{ github.workspace }}/theos
          cd YTABConfig && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../ytabc.deb

      - name: Build DontEatMyContent
        if: ${{ inputs.enable_demc }}
        run: |
          export THEOS=${{ github.workspace }}/theos
          cd DontEatMyContent && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../demc.deb

      - name: Build YouLoop
        if: ${{ inputs.enable_youloop }}
        run: |
          export THEOS=${{ github.workspace }}/theos
          cd YouLoop && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../youloop.deb

      - name: Build YouSpeed
        if: ${{ inputs.enable_youspeed }}
        run: |
          export THEOS=${{ github.workspace }}/theos
          cd YouSpeed && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../youspeed.deb

      # ── 13. Open in YouTube Safari extension ───────────────
      - name: Clone Open in YouTube Safari extension
        if: ${{ inputs.include_open_youtube }}
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 \
            https://github.com/BillyCurtis/OpenYouTubeSafariExtension OpenYoutubeSafariExtension
          cd OpenYoutubeSafariExtension
          git sparse-checkout set --no-cone OpenYouTubeSafariExtension.appex OpenYoutubeSafariExtension.appex
          git checkout --quiet
          find . -maxdepth 1 -type d -name "*.appex" -exec mv {} ../ \;

      # ── 14. IPA 인젝션 ─────────────────────────────────────
      - name: Inject tweaks into IPA
        run: |
          tweaks="ytplus.deb"
          for f in *.deb *.appex; do
            [[ -e "$f" ]] && [[ "$f" != "ytplus.deb" ]] && tweaks="$tweaks $f"
          done
          echo "인젝션할 트윅: $tweaks"
          cyan -i youtube.ipa \
               -o "${{ steps.version.outputs.ipa_name }}" \
               -uwef $tweaks \
               -n "${{ github.event.inputs.app_name }}" \
               -b "${{ github.event.inputs.bundle_id }}"


      # ── 15. GitHub Release 업로드 ──────────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:  ${{ steps.version.outputs.release_tag }}
          name:      ${{ steps.version.outputs.release_tag }}
          files:     ${{ steps.version.outputs.ipa_name }}
          fail_on_unmatched_files: true
