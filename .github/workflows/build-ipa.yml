name: Build YTPlus IPA

on:
  workflow_dispatch:
    inputs:
      decrypted_ipa_url:
        description: "Decrypted YouTube IPA direct download URL"
        required: true
        type: string
      app_name:
        description: "App Name"
        required: true
        default: "YouTube"
        type: string
      bundle_id:
        description: "Bundle ID"
        required: true
        default: "com.google.ios.youtube"
        type: string
      enable_youpip:   { description: "YouPiP",                  default: true, type: boolean }
      enable_ytuhd:    { description: "YTUHD",                   default: true, type: boolean }
      enable_yq:       { description: "YouQuality",              default: true, type: boolean }
      enable_ycq:      { description: "YouChooseQuality",        default: true, type: boolean }
      enable_ryd:      { description: "Return YouTube Dislikes", default: true, type: boolean }
      enable_ytabc:    { description: "YTABConfig",              default: true, type: boolean }
      enable_demc:     { description: "DontEatMyContent",        default: true, type: boolean }
      enable_youloop:  { description: "YouLoop",                 default: true, type: boolean }
      enable_youspeed: { description: "YouSpeed",                default: true, type: boolean }

concurrency:
  group: build-ytplus-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  THEOS: ${{ github.workspace }}/theos
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  HOMEBREW_NO_ANALYTICS: 1
  SDKVERSION: 16.5

jobs:
  build:
    name: Build YTPlus
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          fetch-tags: false

      - name: Cache cyan
        id: cyan-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/pipx
            ~/.local/bin/cyan
            ~/.local/bin/cgen
          key: cyan-pyzule-rw-${{ runner.os }}-v3

      - name: Cache Theos
        id: theos-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.THEOS }}
          key: theos-${{ runner.os }}-sdk16.5-v2

      - name: Install Build Tools
        shell: bash
        run: |
          set -euo pipefail

          NEED_BREW=("")
          for pkg in make ldid dpkg; do
            brew list "$pkg" >/dev/null 2>&1 || NEED_BREW+=("$pkg")
          done
          if [[ ${#NEED_BREW[@]} -gt 1 ]]; then
            NEED_BREW=("${NEED_BREW[@]:1}")
            brew install "${NEED_BREW[@]}"
          else
            echo "Homebrew tools already installed"
          fi
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

          if [[ "${{ steps.cyan-cache.outputs.cache-hit }}" != "true" ]]; then
            python3 -m pip install --upgrade pipx --break-system-packages 2>/dev/null || true
            python3 -m pipx ensurepath
            python3 -m pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          else
            echo "cyan cache hit"
          fi

          CYAN_PATH="$(python3 -m pipx environment --value PIPX_BIN_DIR 2>/dev/null || echo "$HOME/.local/bin")"
          echo "CYAN_BIN_DIR=$CYAN_PATH" >> "$GITHUB_ENV"
          echo "$CYAN_PATH" >> "$GITHUB_PATH"
          export PATH="$CYAN_PATH:$PATH"

          command -v cyan >/dev/null
          echo "cyan: $(command -v cyan)"

      - name: Setup Theos and Download IPA
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          URL="${{ github.event.inputs.decrypted_ipa_url }}"
          if [[ "$URL" == *"dropbox.com"* ]]; then
            URL="${URL/dl=0/dl=1}"
          fi

          curl -L --fail --retry 8 --retry-delay 5 --connect-timeout 30 \
            -A "Mozilla/5.0" "$URL" -o youtube.ipa &
          IPA_PID=$!

          if [[ "${{ steps.theos-cache.outputs.cache-hit }}" != "true" ]]; then
            git clone --depth 1 --recurse-submodules https://github.com/theos/theos.git "$THEOS"
            mkdir -p "$THEOS/sdks"
            git clone --quiet --depth 1 https://github.com/theos/sdks/ /tmp/theos-sdks
            mv /tmp/theos-sdks/iPhoneOS16.5.sdk "$THEOS/sdks/"
          else
            echo "Theos cache hit"
          fi

          wait "$IPA_PID"
          test -s youtube.ipa
          echo "IPA downloaded: $(du -h youtube.ipa | awk '{print $1}')"

          PLIST_PATH="$(unzip -Z1 youtube.ipa "Payload/*.app/Info.plist" 2>/dev/null | head -1 || true)"
          YT_VERSION=""
          if [[ -n "$PLIST_PATH" ]]; then
            PLIST_TMP="$(mktemp)"
            unzip -p youtube.ipa "$PLIST_PATH" > "$PLIST_TMP"
            YT_VERSION="$(plutil -extract CFBundleShortVersionString raw "$PLIST_TMP" 2>/dev/null || true)"
            if [[ -z "$YT_VERSION" ]]; then
              YT_VERSION="$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$PLIST_TMP" 2>/dev/null || true)"
            fi
            rm -f "$PLIST_TMP"
          fi
          if [[ -z "$YT_VERSION" ]]; then
            YT_VERSION="$(echo "$URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | tail -1 || true)"
          fi
          [[ -n "$YT_VERSION" ]] || YT_VERSION="Unknown"

          echo "YouTube version: $YT_VERSION"
          echo "ipa_name=YTPlus_5.2.1_${YT_VERSION}.ipa" >> "$GITHUB_OUTPUT"
          echo "release_name=YTPlus_5.2.1_${YT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=YTPlus_5.2.1_${YT_VERSION}" >> "$GITHUB_OUTPUT"

          TWEAK_LIST="YTPlus"
          [[ "${{ github.event.inputs.enable_ytabc }}" == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYTABConfig"
          [[ "${{ github.event.inputs.enable_yq }}" == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYouQuality"
          [[ "${{ github.event.inputs.enable_ycq }}" == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYouChooseQuality"
          [[ "${{ github.event.inputs.enable_ryd }}" == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nReturn YouTube Dislikes"
          [[ "${{ github.event.inputs.enable_demc }}" == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nDontEatMyContent"
          [[ "${{ github.event.inputs.enable_youpip }}" == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYouPiP"
          [[ "${{ github.event.inputs.enable_ytuhd }}" == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYTUHD"
          [[ "${{ github.event.inputs.enable_youloop }}" == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYouLoop"
          [[ "${{ github.event.inputs.enable_youspeed }}" == "true" ]] && TWEAK_LIST="$TWEAK_LIST\nYouSpeed"

          {
            echo "release_notes<<EOF"
            echo "Updated to YouTube v${YT_VERSION}"
            echo ""
            echo "Included Tweaks:"
            echo ""
            echo -e "$TWEAK_LIST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare Tweaks
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPOS=(
            "YouTubeHeader|https://github.com/PoomSmart/YouTubeHeader.git|true"
            "PSHeader|https://github.com/PoomSmart/PSHeader.git|true"
            "YTVideoOverlay|https://github.com/PoomSmart/YTVideoOverlay.git|true"
            "DontEatMyContent|https://github.com/therealFoxster/DontEatMyContent.git|${{ github.event.inputs.enable_demc }}"
            "YouPiP|https://github.com/PoomSmart/YouPiP.git|${{ github.event.inputs.enable_youpip }}"
            "YouQuality|https://github.com/PoomSmart/YouQuality.git|${{ github.event.inputs.enable_yq }}"
            "YouChooseQuality|https://github.com/PoomSmart/YouChooseQuality.git|${{ github.event.inputs.enable_ycq }}"
            "Return-YouTube-Dislikes|https://github.com/PoomSmart/Return-YouTube-Dislikes.git|${{ github.event.inputs.enable_ryd }}"
            "YTABConfig|https://github.com/PoomSmart/YTABConfig.git|${{ github.event.inputs.enable_ytabc }}"
            "YouLoop|https://github.com/bhackel/YouLoop.git|${{ github.event.inputs.enable_youloop }}"
            "YouSpeed|https://github.com/PoomSmart/YouSpeed.git|${{ github.event.inputs.enable_youspeed }}"
          )

          CACHE_DIR="${{ github.workspace }}/tweaks"
          BUILD_DIR="${{ github.workspace }}/tweaks-build"
          READY_DIR="${{ github.workspace }}/ready_packages"
          SHA_STORE="$(mktemp -d)"
          mkdir -p "$CACHE_DIR" "$BUILD_DIR" "$READY_DIR"
          CACHE_UPDATED=false
          HEADER_ONLY="YouTubeHeader PSHeader"

          cache_repo_deb() {
            local base_url="$1"
            local package_id="$2"
            local cache_name="$3"
            local output_name="$4"
            local packages_file file_url cache_key cached target

            packages_file="$(mktemp)"
            curl -fsSL --retry 5 "${base_url%/}/Packages" -o "$packages_file"
            file_url="$(
              awk -v pkg="$package_id" '
                BEGIN { RS=""; FS="\n" }
                {
                  package_name = architecture = filename = ""
                  for (i = 1; i <= NF; i++) {
                    if ($i ~ /^Package: /) package_name = substr($i, 10)
                    if ($i ~ /^Architecture: /) architecture = substr($i, 15)
                    if ($i ~ /^Filename: /) filename = substr($i, 11)
                  }
                  if (package_name == pkg && architecture == "iphoneos-arm") {
                    print filename
                    exit
                  }
                }
              ' "$packages_file"
            )"
            rm -f "$packages_file"

            if [[ -z "$file_url" ]]; then
              echo "Could not find ${package_id} in ${base_url}/Packages"
              return 1
            fi
            [[ "$file_url" == http* ]] || file_url="${base_url%/}/${file_url#./}"
            cache_key="$(printf "%s" "$file_url" | shasum -a 256 | awk '{print substr($1, 1, 12)}')"
            cached="$(find "$CACHE_DIR" -maxdepth 1 -name "${cache_name}_repo_${cache_key}.deb" -print -quit 2>/dev/null || true)"
            target="$READY_DIR/$output_name"

            if [[ -n "$cached" ]]; then
              echo "  repo cache hit $cache_name ($cache_key)"
              cp "$cached" "$target"
            else
              echo "  repo changed $cache_name ($cache_key), downloading"
              curl -fL --retry 5 "$file_url" -o "$target"
              rm -f "$CACHE_DIR/${cache_name}_repo_"*.deb
              cp "$target" "$CACHE_DIR/${cache_name}_repo_${cache_key}.deb"
              touch "$SHA_STORE/CACHE_UPDATED"
            fi
          }

          cache_repo_deb_version() {
            local base_url="$1"
            local package_id="$2"
            local wanted_version="$3"
            local cache_name="$4"
            local output_name="$5"
            local packages_file file_url cache_key cached target

            packages_file="$(mktemp)"
            curl -fsSL --retry 5 "${base_url%/}/Packages" -o "$packages_file"
            file_url="$(
              awk -v pkg="$package_id" -v ver="$wanted_version" '
                BEGIN { RS=""; FS="\n"; selected = "" }
                {
                  package_name = architecture = version = filename = ""
                  for (i = 1; i <= NF; i++) {
                    if ($i ~ /^Package: /) package_name = substr($i, 10)
                    if ($i ~ /^Version: /) version = substr($i, 10)
                    if ($i ~ /^Architecture: /) architecture = substr($i, 15)
                    if ($i ~ /^Filename: /) filename = substr($i, 11)
                  }
                  if (package_name == pkg && version == ver && architecture == "iphoneos-arm") {
                    selected = filename
                  }
                }
                END { print selected }
              ' "$packages_file"
            )"
            rm -f "$packages_file"

            if [[ -z "$file_url" ]]; then
              echo "Could not find ${package_id} ${wanted_version} in ${base_url}/Packages"
              return 1
            fi

            [[ "$file_url" == http* ]] || file_url="${base_url%/}/${file_url#./}"
            cache_key="$(printf "%s|%s" "$file_url" "$wanted_version" | shasum -a 256 | awk '{print substr($1, 1, 12)}')"
            cached="$(find "$CACHE_DIR" -maxdepth 1 -name "${cache_name}_${wanted_version}_repo_${cache_key}.deb" -print -quit 2>/dev/null || true)"
            target="$READY_DIR/$output_name"

            if [[ -n "$cached" ]]; then
              echo "  pinned repo cache hit $cache_name $wanted_version ($cache_key)"
              cp "$cached" "$target"
            else
              echo "  pinned repo cache miss $cache_name $wanted_version ($cache_key), downloading"
              curl -fL --retry 5 "$file_url" -o "$target"
              rm -f "$CACHE_DIR/${cache_name}_"*_repo_*.deb
              cp "$target" "$CACHE_DIR/${cache_name}_${wanted_version}_repo_${cache_key}.deb"
              touch "$SHA_STORE/CACHE_UPDATED"
            fi
          }

          echo "Copy local patched debs"
          for deb in "$CACHE_DIR"/*.deb; do
            [[ -f "$deb" ]] || continue
            fname="$(basename "$deb" .deb)"
            sha_part="${fname##*_}"
            if [[ "$fname" == *_repo_* || "$sha_part" =~ ^[0-9a-fA-F]{8}$ || "$sha_part" =~ ^[0-9a-fA-F]{12}$ || "$sha_part" =~ ^[0-9a-fA-F]{40}$ ]]; then
              continue
            fi
            cp "$deb" "$READY_DIR/"
            echo "  copied $(basename "$deb")"
          done

          if [[ "${{ github.event.inputs.enable_ytuhd }}" == "true" ]]; then
            echo "Prepare pinned YouGroupSettings dependency"
            cache_repo_deb_version "https://repo.chariz.com" "com.ps.yougroupsettings" "1.0.8" "YouGroupSettings" "YouGroupSettings_1.0.8.deb"
            echo "Prepare official YTUHD deb"
            cache_repo_deb "https://poomsmart.github.io/repo" "com.ps.ytuhd" "YTUHD" "YTUHD_official.deb"
            echo "Prepare libundirect dependency"
            cache_repo_deb "https://opa334.github.io" "com.opa334.libundirect" "libundirect" "libundirect.deb"
          else
            echo "Prepare pinned YouGroupSettings dependency"
            cache_repo_deb_version "https://repo.chariz.com" "com.ps.yougroupsettings" "1.0.8" "YouGroupSettings" "YouGroupSettings_1.0.8.deb"
          fi

          echo "Fetch latest SHAs"
          SHA_PIDS=("")
          for repo in "${REPOS[@]}"; do
            NAME="${repo%%|*}"
            rest="${repo#*|}"
            URL="${rest%%|*}"
            ENABLED="${rest#*|}"
            [[ "$ENABLED" == "true" ]] || continue
            REPO_PATH="$(echo "$URL" | sed 's|https://github.com/||;s|\.git$||')"
            (
              SHA="$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/$REPO_PATH/commits?per_page=1" \
                | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['sha'][:8])" 2>/dev/null || echo unknown)"
              echo "$SHA" > "$SHA_STORE/${NAME}.sha"
            ) &
            SHA_PIDS+=("$!")
          done
          for pid in "${SHA_PIDS[@]}"; do
            [[ -n "$pid" ]] || continue
            wait "$pid" || true
          done

          echo "Resolve cache and clone misses"
          CLONE_PIDS=("")
          CLONE_LIST=("")
          for repo in "${REPOS[@]}"; do
            NAME="${repo%%|*}"
            rest="${repo#*|}"
            URL="${rest%%|*}"
            ENABLED="${rest#*|}"
            if [[ "$ENABLED" != "true" ]]; then
              echo "  skip $NAME"
              continue
            fi

            LATEST_SHA="$(cat "$SHA_STORE/${NAME}.sha" 2>/dev/null || echo unknown)"
            if echo "$HEADER_ONLY" | grep -qw "$NAME"; then
              CACHED="$(find "$CACHE_DIR" -maxdepth 1 -name "${NAME}_${LATEST_SHA}.tar" -print -quit 2>/dev/null || true)"
              if [[ -n "$CACHED" && "$LATEST_SHA" != "unknown" ]]; then
                echo "  header cache hit $NAME ($LATEST_SHA)"
                mkdir -p "$BUILD_DIR/$NAME"
                tar -xf "$CACHED" -C "$BUILD_DIR/$NAME"
              else
                echo "  clone header $NAME ($LATEST_SHA)"
                git clone --quiet --depth 1 --recurse-submodules "$URL" "$BUILD_DIR/$NAME" &
                CLONE_PIDS+=("$!")
                CLONE_LIST+=("$NAME")
              fi
            else
              CACHED="$(find "$CACHE_DIR" -maxdepth 1 -name "${NAME}_${LATEST_SHA}.deb" -print -quit 2>/dev/null || true)"
              if [[ -n "$CACHED" && "$LATEST_SHA" != "unknown" ]]; then
                echo "  deb cache hit $NAME ($LATEST_SHA)"
                cp "$CACHED" "$READY_DIR/"
              else
                echo "  clone $NAME ($LATEST_SHA)"
                git clone --quiet --depth 1 --recurse-submodules "$URL" "$BUILD_DIR/$NAME" &
                CLONE_PIDS+=("$!")
                CLONE_LIST+=("$NAME")
              fi
            fi
          done

          for pid in "${CLONE_PIDS[@]}"; do
            [[ -n "$pid" ]] || continue
            wait "$pid" || true
          done

          if [[ -d "$BUILD_DIR/YouTubeHeader" ]]; then
            mkdir -p "$THEOS/include/YouTubeHeader"
            rsync -a --exclude='.git' "$BUILD_DIR/YouTubeHeader/" "$THEOS/include/YouTubeHeader/"
            rsync -a --exclude='.git' "$BUILD_DIR/YouTubeHeader/" "$THEOS/include/"
          fi
          if [[ -d "$BUILD_DIR/PSHeader" ]]; then
            rm -rf "$BUILD_DIR/PSHeader/CoreImage"
            mkdir -p "$THEOS/include/PSHeader"
            rsync -a --exclude='.git' "$BUILD_DIR/PSHeader/" "$THEOS/include/PSHeader/"
            rsync -a --exclude='.git' "$BUILD_DIR/PSHeader/" "$THEOS/include/"
          fi

          if [[ -d "$BUILD_DIR/DontEatMyContent" ]]; then
            sed -i '' "s/^CGFloat constant;/extern CGFloat constant;/" "$BUILD_DIR/DontEatMyContent/Tweak.h" 2>/dev/null || true
            perl -0pi -e 's/#import "Tweak\.h"\n/#import "Tweak.h"\nCGFloat constant = 0;\n/' "$BUILD_DIR/DontEatMyContent/Tweak.x" 2>/dev/null || true
          fi

          export DEBUG=0 FINALPACKAGE=1 SIDELOAD=1 SDKVERSION=16.5
          BUILD_PIDS=("")
          for NAME in "${CLONE_LIST[@]}"; do
            [[ -n "$NAME" ]] || continue
            DIR="$BUILD_DIR/$NAME"
            SHA="$(cat "$SHA_STORE/${NAME}.sha" 2>/dev/null || echo unknown)"

            if echo "$HEADER_ONLY" | grep -qw "$NAME"; then
              if [[ -d "$DIR" && "$SHA" != "unknown" ]]; then
                rm -f "$CACHE_DIR/${NAME}_"*.tar
                tar -cf "$CACHE_DIR/${NAME}_${SHA}.tar" -C "$DIR" --exclude='.git' .
                touch "$SHA_STORE/CACHE_UPDATED"
              fi
              continue
            fi

            [[ -d "$DIR" ]] || continue
            (
              pushd "$DIR" >/dev/null
              if [[ -f Makefile ]]; then
                make clean >/dev/null 2>&1 || true
                if make -j"$(sysctl -n hw.ncpu)" package >"/tmp/build_${NAME}.log" 2>&1; then
                  for deb in packages/*.deb; do
                    [[ -f "$deb" ]] || continue
                    cp "$deb" "$READY_DIR/"
                    if [[ "$SHA" != "unknown" ]]; then
                      rm -f "$CACHE_DIR/${NAME}_"*.deb
                      cp "$deb" "$CACHE_DIR/${NAME}_${SHA}.deb"
                      touch "$SHA_STORE/CACHE_UPDATED"
                    fi
                  done
                  echo "  built $NAME"
                else
                  echo "  build failed $NAME"
                  tail -40 "/tmp/build_${NAME}.log"
                  exit 1
                fi
              fi
              popd >/dev/null
            ) &
            BUILD_PIDS+=("$!")
          done
          for pid in "${BUILD_PIDS[@]}"; do
            [[ -n "$pid" ]] || continue
            wait "$pid"
          done

          [[ -f "$SHA_STORE/CACHE_UPDATED" ]] && CACHE_UPDATED=true

          echo "Ready debs"
          ls -lh "$READY_DIR/"
          DEB_COUNT="$(find "$READY_DIR" -name "*.deb" | wc -l | tr -d ' ')"
          if [[ "$DEB_COUNT" -eq 0 ]]; then
            echo "No deb files to inject"
            exit 1
          fi
          if [[ "${{ github.event.inputs.enable_ytuhd }}" == "true" ]] && ! find "$READY_DIR" -name "YTUHD*.deb" -print -quit | grep -q .; then
            echo "YTUHD is enabled but no YTUHD deb is ready"
            exit 1
          fi
          echo "CACHE_UPDATED=$CACHE_UPDATED" >> "$GITHUB_ENV"

      - name: Commit Updated Tweak Cache
        if: env.CACHE_UPDATED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tweaks/
          git diff --cached --quiet && exit 0
          git commit -m "chore: update tweak cache [skip ci]"
          git push

      - name: Inject
        shell: bash
        run: |
          set -euo pipefail
          CYAN="$CYAN_BIN_DIR/cyan"
          if [[ ! -x "$CYAN" ]]; then
            echo "cyan not found: $CYAN"
            exit 1
          fi

          ALL_DEBS_FILE="$(mktemp)"
          find "${{ github.workspace }}/ready_packages" -name "*.deb" | sort > "$ALL_DEBS_FILE"

          DEBS=("")
          for pattern in "libundirect" "YouGroupSettings" "YTVideoOverlay"; do
            while IFS= read -r deb; do
              [[ -n "$deb" ]] || continue
              DEBS+=("$deb")
            done < <(grep "/.*${pattern}.*\.deb$" "$ALL_DEBS_FILE" || true)
          done
          while IFS= read -r deb; do
            [[ -n "$deb" ]] || continue
            case "$(basename "$deb")" in
              *libundirect*.deb|*YouGroupSettings*.deb|*YTVideoOverlay*.deb) continue ;;
            esac
            DEBS+=("$deb")
          done < "$ALL_DEBS_FILE"
          rm -f "$ALL_DEBS_FILE"

          DEBS=("${DEBS[@]:1}")
          if [[ ${#DEBS[@]} -eq 0 ]]; then
            echo "No deb files found for injection"
            exit 1
          fi
          printf "Injecting debs:\n"
          printf "  %s\n" "${DEBS[@]}"

          "$CYAN" \
            -i ./youtube.ipa \
            -o "${{ steps.meta.outputs.ipa_name }}" \
            -f "${DEBS[@]}" \
            -e \
            -n "${{ github.event.inputs.app_name }}" \
            -b "${{ github.event.inputs.bundle_id }}"

          test -s "${{ steps.meta.outputs.ipa_name }}"
          echo "IPA complete: ${{ steps.meta.outputs.ipa_name }}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          body: ${{ steps.meta.outputs.release_notes }}
          files: ${{ steps.meta.outputs.ipa_name }}
          overwrite_files: true
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
