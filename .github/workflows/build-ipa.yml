name: Build YTPlus IPA

on:
  workflow_dispatch:
    inputs:
      decrypted_ipa_url:
        description: 'Decrypted YouTube IPA direct download URL'
        required: true
        type: string
      app_name:
        description: 'App Name (Optional)'
        required: true
        default: 'YouTube'
        type: string
      bundle_id:
        description: 'BundleID (Optional)'
        required: true
        default: 'com.google.ios.youtube'
        type: string

      # ── 트윅 선택 옵션 ──────────────────────────
      enable_youpip:   { description: 'YouPiP',                  default: true, type: boolean }
      enable_ytuhd:    { description: 'YTUHD',                   default: true, type: boolean }
      enable_yq:       { description: 'YouQuality',              default: true, type: boolean }
      enable_ycq:      { description: 'YouChooseQuality',        default: true, type: boolean }
      enable_ryd:      { description: 'Return YouTube Dislikes', default: true, type: boolean }
      enable_ytabc:    { description: 'YTABConfig',              default: true, type: boolean }
      enable_demc:     { description: 'DontEatMyContent',        default: true, type: boolean }
      enable_youloop:  { description: 'YouLoop',                 default: true, type: boolean }
      enable_youspeed: { description: 'YouSpeed',                default: true, type: boolean }

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  THEOS: ${{ github.workspace }}/theos
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1

jobs:
  build:
    name: Build YTPlus
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      # ── 1. 저장소 체크아웃 ────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Homebrew 캐시 복원 ─────────────────────
      - name: Cache Homebrew packages
        id: brew-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/make
            /opt/homebrew/Cellar/ldid
            /opt/homebrew/Cellar/dpkg
            /opt/homebrew/Cellar/aria2
            /opt/homebrew/bin/make
            /opt/homebrew/bin/ldid
            /opt/homebrew/bin/dpkg
            /opt/homebrew/bin/aria2c
          key: brew-${{ runner.os }}-make-ldid-dpkg-aria2-v1

      # ── cyan(pyzule) 캐시 복원 ─────────────────────
      - name: Cache cyan (pyzule-rw)
        id: cyan-cache
        uses: actions/cache@v4
        with:
          path: |
            /Users/runner/.local/pipx
            /Users/runner/.local/bin/cyan
            /Users/runner/.local/bin/cgen
          key: cyan-pyzule-rw-${{ runner.os }}-v2

      # ── 3. 도구 설치 (캐시 미스 시에만 실제 brew install) ─────────
      - name: Install Build Tools
        shell: bash
        run: |
          if [[ "${{ steps.brew-cache.outputs.cache-hit }}" != "true" ]]; then
            brew install make ldid dpkg aria2
          else
            brew link --overwrite make ldid dpkg aria2 2>/dev/null || true
          fi
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

          if [[ "${{ steps.cyan-cache.outputs.cache-hit }}" != "true" ]]; then
            python3 -m pip install --upgrade pipx --break-system-packages 2>/dev/null || true
            python3 -m pipx ensurepath
            python3 -m pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          else
            echo "cyan 캐시 히트"
          fi

          CYAN_PATH=$(python3 -m pipx environment --value PIPX_BIN_DIR 2>/dev/null || echo "$HOME/.local/bin")
          echo "CYAN_BIN_DIR=$CYAN_PATH" >> $GITHUB_ENV
          echo "$CYAN_PATH" >> $GITHUB_PATH
          export PATH="$CYAN_PATH:$PATH"

          if ! command -v cyan &>/dev/null; then
            echo "cyan 설치 실패! 경로: $CYAN_PATH"
            ls -la "$CYAN_PATH" || true
            exit 1
          fi
          echo "cyan 확인: $(which cyan)"

      # ── 4. Theos 캐시 복원 ────────────────────────
      - name: Cache Theos
        id: theos-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: theos-${{ runner.os }}-v1

      # ── 5. Theos 설치 + SDK 다운로드 + IPA 다운로드 (병렬) ──────────
      #   IPA 다운 완료 후 plist에서 YT 버전을 읽어 메타데이터 출력
      - name: Setup Theos and Download IPA
        id: meta
        shell: bash
        run: |
          echo "SDKVERSION=16.5" >> $GITHUB_ENV

          # IPA 다운로드 (백그라운드)
          URL="${{ github.event.inputs.decrypted_ipa_url }}"
          [[ "$URL" == *"dropbox.com"* ]] && URL="${URL/dl=0/dl=1}"
          aria2c -x 4 -s 4 -k 1M --user-agent="Mozilla/5.0" \
            --retry-wait=5 --max-tries=10 "$URL" -o youtube.ipa &
          IPA_PID=$!

          # Theos 설치 (캐시 미스 시에만)
          if [[ "${{ steps.theos-cache.outputs.cache-hit }}" != "true" ]]; then
            echo "Theos 클론 중..."
            git clone --depth 1 --recurse-submodules \
              https://github.com/theos/theos.git $THEOS
            mkdir -p $THEOS/sdks

            git clone --quiet --depth=1 https://github.com/theos/sdks/ /tmp/theos-sdks &
            SDK_PID=$!

            wait $SDK_PID
            mv /tmp/theos-sdks/iPhoneOS16.5.sdk $THEOS/sdks/
          else
            echo "Theos 캐시 히트"
          fi

          # IPA 다운로드 완료 대기
          wait $IPA_PID
          echo "IPA 다운로드 완료: $(ls -lh youtube.ipa | awk '{print $5}')"

          # ── plist에서 YouTube 버전 추출 ─────────────────────────────
          # unzip -p로 Info.plist만 스트림 추출 → 전체 압축 해제 불필요, 7s→~0s
          PLIST_PATH=$(unzip -Z1 youtube.ipa "Payload/*.app/Info.plist" 2>/dev/null | head -1)
          if [[ -n "$PLIST_PATH" ]]; then
            PLIST_TMP=$(mktemp)
            unzip -p youtube.ipa "$PLIST_PATH" > "$PLIST_TMP"
            YT_VERSION=$(plutil -extract CFBundleShortVersionString raw "$PLIST_TMP" 2>/dev/null || true)
            if [[ -z "$YT_VERSION" ]]; then
              YT_VERSION=$(plutil -extract CFBundleVersion raw "$PLIST_TMP" 2>/dev/null || true)
            fi
            rm -f "$PLIST_TMP"
          fi

          # 최후 폴백: URL에서 추출
          if [[ -z "$YT_VERSION" ]]; then
            echo "⚠️  plist 파싱 실패, URL에서 버전 추출 시도"
            YT_VERSION=$(echo "$URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | tail -1)
          fi
          if [[ -z "$YT_VERSION" ]]; then YT_VERSION="Unknown"; fi

          echo "📦 YouTube 버전: $YT_VERSION"

          # TWEAK_VERSION은 고정값 (YTPlus 트윅 버전)
          TWEAK_VERSION="5.2.1"

          echo "ipa_name=YTPlus_${TWEAK_VERSION}_${YT_VERSION}.ipa" >> "$GITHUB_OUTPUT"
          echo "release_name=YTPlus_${TWEAK_VERSION}_${YT_VERSION}"            >> "$GITHUB_OUTPUT"
          echo "tag=YTPlus_${TWEAK_VERSION}_${YT_VERSION}"                     >> "$GITHUB_OUTPUT"

      # ── 6. 트윅 캐시 확인 및 선택적 클론/빌드 ────────────────────────
      - name: Check Cache and Build Tweaks Selectively
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          REPOS=(
            "YouTubeHeader|https://github.com/PoomSmart/YouTubeHeader.git|true"
            "PSHeader|https://github.com/PoomSmart/PSHeader.git|true"
            "YouGroupSettings|https://github.com/PoomSmart/YouGroupSettings.git|true"
            "YTVideoOverlay|https://github.com/PoomSmart/YTVideoOverlay.git|true"
            "DontEatMyContent|https://github.com/therealFoxster/DontEatMyContent.git|${{ github.event.inputs.enable_demc }}"
            "YouPiP|https://github.com/PoomSmart/YouPiP.git|${{ github.event.inputs.enable_youpip }}"
            "YouQuality|https://github.com/PoomSmart/YouQuality.git|${{ github.event.inputs.enable_yq }}"
            "Return-YouTube-Dislikes|https://github.com/PoomSmart/Return-YouTube-Dislikes.git|${{ github.event.inputs.enable_ryd }}"
            "YTABConfig|https://github.com/PoomSmart/YTABConfig.git|${{ github.event.inputs.enable_ytabc }}"
            "YouLoop|https://github.com/bhackel/YouLoop.git|${{ github.event.inputs.enable_youloop }}"
            "YouSpeed|https://github.com/PoomSmart/YouSpeed.git|${{ github.event.inputs.enable_youspeed }}"
            "YouChooseQuality|https://github.com/PoomSmart/YouChooseQuality.git|${{ github.event.inputs.enable_ycq }}"
            "YTUHD|https://github.com/PoomSmart/YTUHD.git|${{ github.event.inputs.enable_ytuhd }}"
          )

          CACHE_DIR="${{ github.workspace }}/tweaks"
          BUILD_DIR="${{ github.workspace }}/tweaks_src"
          READY_DIR="${{ github.workspace }}/ready_packages"
          SHA_STORE=$(mktemp -d)
          mkdir -p "$CACHE_DIR" "$BUILD_DIR" "$READY_DIR"

          CACHE_UPDATED=false
          CLONE_PIDS=()
          CLONE_LIST=()
          SHA_PIDS=()

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  SHA 조회 (병렬)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # ── 1단계: SHA 조회 전부 병렬 ─────────────────────────────────
          for repo in "${REPOS[@]}"; do
            NAME="${repo%%|*}"; rest="${repo#*|}"
            URL="${rest%%|*}";  ENABLED="${rest#*|}"
            [[ "$ENABLED" != "true" ]] && continue

            REPO_PATH=$(echo "$URL" | sed 's|https://github.com/||;s|\.git$||')
            (
              SHA=$(curl -sf \
                -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/$REPO_PATH/commits?per_page=1" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['sha'][:8])" 2>/dev/null \
                || echo "unknown")
              echo "$SHA" > "$SHA_STORE/${NAME}.sha"
            ) &
            SHA_PIDS+=($!)
          done

          for pid in "${SHA_PIDS[@]}"; do wait "$pid" || true; done

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  캐시 확인 + 클론 예약"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # ── 2단계: 캐시 확인 + 클론 병렬 예약 ─────────────────────────
          HEADER_ONLY="YouTubeHeader PSHeader YouGroupSettings YTVideoOverlay"

          for repo in "${REPOS[@]}"; do
            NAME="${repo%%|*}"; rest="${repo#*|}"
            URL="${rest%%|*}";  ENABLED="${rest#*|}"

            if [[ "$ENABLED" != "true" ]]; then
              echo "  ⏭  $NAME — 비활성화"
              continue
            fi

            LATEST_SHA=$(cat "$SHA_STORE/${NAME}.sha" 2>/dev/null || echo "unknown")

            if echo "$HEADER_ONLY" | grep -qw "$NAME"; then
              # 헤더 레포: .tar로 캐시 (deb 없음)
              CACHED_TAR=$(ls "$CACHE_DIR/${NAME}_${LATEST_SHA}.tar" 2>/dev/null || true)
              if [[ -n "$CACHED_TAR" && "$LATEST_SHA" != "unknown" ]]; then
                echo "  ✅ $NAME — 헤더 캐시 히트 (${LATEST_SHA})"
                mkdir -p "$BUILD_DIR/$NAME"
                tar -xf "$CACHED_TAR" -C "$BUILD_DIR/$NAME"
              else
                [[ "$LATEST_SHA" == "unknown" ]] \
                  && echo "  ⚠️  $NAME — SHA 조회 실패, 클론 예약" \
                  || echo "  🔄 $NAME — 새 버전 (${LATEST_SHA}), 클론 예약"
                git clone --quiet --depth=1 --recurse-submodules "$URL" "$BUILD_DIR/$NAME" &
                CLONE_PIDS+=($!)
                CLONE_LIST+=("$NAME")
              fi
            else
              # 트윅 레포: .deb로 캐시
              CACHED=$(ls "$CACHE_DIR/${NAME}_${LATEST_SHA}.deb" 2>/dev/null || true)
              if [[ -n "$CACHED" && "$LATEST_SHA" != "unknown" ]]; then
                echo "  ✅ $NAME — 캐시 히트 (${LATEST_SHA})"
                cp "$CACHED" "$READY_DIR/"
              else
                [[ "$LATEST_SHA" == "unknown" ]] \
                  && echo "  ⚠️  $NAME — SHA 조회 실패, 클론 예약" \
                  || echo "  🔄 $NAME — 새 버전 (${LATEST_SHA}), 클론 예약"
                git clone --quiet --depth=1 --recurse-submodules "$URL" "$BUILD_DIR/$NAME" &
                CLONE_PIDS+=($!)
                CLONE_LIST+=("$NAME")
              fi
            fi
          done

          # ── 3단계: 클론 완료 대기 ──────────────────────────────────────
          if [[ ${#CLONE_PIDS[@]} -gt 0 ]]; then
            echo ""
            echo "  ⏳ 클론 완료 대기 (${#CLONE_PIDS[@]}개)..."
            for pid in "${CLONE_PIDS[@]}"; do wait "$pid" || true; done
            echo "  모든 클론 완료"
          fi

          # ── 4단계: 헤더 구조화 (.git 제외하고 복사) ─────────────────────
          if [[ -d "$BUILD_DIR/YouTubeHeader" ]]; then
            mkdir -p $THEOS/include/YouTubeHeader
            rsync -a --exclude='.git' "$BUILD_DIR/YouTubeHeader/" $THEOS/include/YouTubeHeader/
            rsync -a --exclude='.git' "$BUILD_DIR/YouTubeHeader/" $THEOS/include/
          fi
          if [[ -d "$BUILD_DIR/PSHeader" ]]; then
            rm -rf "$BUILD_DIR/PSHeader/CoreImage"
            mkdir -p $THEOS/include/PSHeader
            rsync -a --exclude='.git' "$BUILD_DIR/PSHeader/" $THEOS/include/PSHeader/
            rsync -a --exclude='.git' "$BUILD_DIR/PSHeader/" $THEOS/include/
          fi

          # ── 5단계: DontEatMyContent 패치 ──────────────────────────────
          if [[ -d "$BUILD_DIR/DontEatMyContent" ]]; then
            sed -i '' "s/^CGFloat constant;/extern CGFloat constant;/" \
              "$BUILD_DIR/DontEatMyContent/Tweak.h"
            sed -i '' '/#import "Tweak.h"/a \
            CGFloat constant = 0;
            ' "$BUILD_DIR/DontEatMyContent/Tweak.x"
          fi

          # ── 6단계: 병렬 빌드 ──────────────────────────────────────────
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  빌드 (병렬)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          export DEBUG=0 FINALPACKAGE=1 SIDELOAD=1 SDKVERSION=16.5

          BUILD_PIDS=()
          BUILD_NAMES=()
          HEADER_ONLY="YouTubeHeader PSHeader YouGroupSettings YTVideoOverlay"

          for NAME in "${CLONE_LIST[@]}"; do
            if echo "$HEADER_ONLY" | grep -qw "$NAME"; then
              # 헤더 전용: 빌드 불필요, tar로 캐시 저장
              DIR="$BUILD_DIR/$NAME"
              SHA=$(cat "$SHA_STORE/${NAME}.sha" 2>/dev/null || echo "unknown")
              if [[ -d "$DIR" && "$SHA" != "unknown" ]]; then
                rm -f "$CACHE_DIR/${NAME}_"*.tar
                tar -cf "$CACHE_DIR/${NAME}_${SHA}.tar" -C "$DIR" --exclude='.git' .
                touch "$SHA_STORE/CACHE_UPDATED"
                echo "  💾 헤더 캐시 저장: ${NAME}_${SHA}.tar"
              fi
              echo "  📎 $NAME — 헤더 전용, 빌드 건너뜀"
              continue
            fi

            DIR="$BUILD_DIR/$NAME"
            SHA=$(cat "$SHA_STORE/${NAME}.sha" 2>/dev/null || echo "unknown")
            [[ ! -d "$DIR" ]] && { echo "  ⚠️  $NAME — 디렉토리 없음"; continue; }

            echo "  🔨 $NAME 빌드 시작 (백그라운드)..."

            (
              if [[ "$NAME" == "YTUHD" && -d "$DIR/vendor/libvpx" ]]; then
                pushd "$DIR/vendor/libvpx" > /dev/null
                ./configure --target=arm64-darwin-gcc \
                  --disable-examples --disable-tools --disable-docs \
                  --enable-vp9-decoder --enable-pic > /dev/null 2>&1
                make -j$(sysctl -n hw.ncpu) libvpx.a > /dev/null 2>&1
                mkdir -p ../libvpx_ios && cp libvpx.a ../libvpx_ios/
                popd > /dev/null
              fi

              pushd "$DIR" > /dev/null
              if [[ -f "Makefile" ]]; then
                make clean > /dev/null 2>&1 || true
                if make -j$(sysctl -n hw.ncpu) package > /tmp/build_${NAME}.log 2>&1; then
                  for deb in packages/*.deb; do
                    [[ -f "$deb" ]] || continue
                    cp "$deb" "$READY_DIR/"
                    rm -f "$CACHE_DIR/${NAME}_"*.deb
                    cp "$deb" "$CACHE_DIR/${NAME}_${SHA}.deb"
                    touch "$SHA_STORE/CACHE_UPDATED"
                    echo "  💾 캐시 저장: ${NAME}_${SHA}.deb"
                  done
                  echo "  ✅ $NAME 빌드 완료"
                else
                  echo "  ❌ $NAME 빌드 실패"
                  cat /tmp/build_${NAME}.log | tail -20
                fi
              fi
              popd > /dev/null
            ) &
            BUILD_PIDS+=($!)
            BUILD_NAMES+=("$NAME")
          done

          if [[ ${#BUILD_PIDS[@]} -gt 0 ]]; then
            echo "  ⏳ 빌드 완료 대기 (${#BUILD_PIDS[@]}개)..."
            for pid in "${BUILD_PIDS[@]}"; do wait "$pid" || true; done
            echo "  모든 빌드 완료"
          fi

          if [[ -f "$SHA_STORE/CACHE_UPDATED" ]]; then
            CACHE_UPDATED=true
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  주입할 .deb 목록"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ls -lh "$READY_DIR/"

          echo "CACHE_UPDATED=$CACHE_UPDATED" >> $GITHUB_ENV

      # ── 7. 새 캐시가 있으면 저장소에 push ────────────────────────
      - name: Commit Updated Tweak Cache
        if: env.CACHE_UPDATED == 'true'
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tweaks/*.deb tweaks/*.tar 2>/dev/null || true
          git diff --cached --quiet && echo "변경사항 없음" && exit 0
          git commit -m "chore: 트윅 캐시 업데이트 [skip ci]"
          git push

      # ── 8. 인젝션 및 릴리스 ──────────────────────────────────────
      - name: Inject and Release
        shell: bash
        run: |
          CYAN="$CYAN_BIN_DIR/cyan"
          if [[ ! -x "$CYAN" ]]; then
            echo "cyan을 찾을 수 없습니다: $CYAN"
            ls -la "$CYAN_BIN_DIR" || true
            exit 1
          fi

          # YTLite deb에서 dylib + bundle 추출
          # cyan은 deb에서 dylib만 꺼내고 YTLite.bundle은 무시하기 때문에
          # bundle을 별도로 추출해서 함께 주입해야 앱이 리소스를 찾을 수 있음
          YTLITE_DEB=$(ls ${{ github.workspace }}/tweaks/com.dvntm.ytlite_*.deb 2>/dev/null | head -1)
          if [[ -z "$YTLITE_DEB" ]]; then
            echo "❌ YTLite deb를 찾을 수 없습니다 (tweaks/ 폴더 확인)"
            exit 1
          fi

          YTLITE_EXTRACT=$(mktemp -d)
          cd "$YTLITE_EXTRACT"
          ar x "$YTLITE_DEB"
          # xz, lzma 모두 지원
          if [[ -f data.tar.xz ]]; then
            tar -xf data.tar.xz
          elif [[ -f data.tar.lzma ]]; then
            tar -xf data.tar.lzma
          fi
          cd ${{ github.workspace }}

          YTLITE_DYLIB=$(find "$YTLITE_EXTRACT" -name "YTLite.dylib" | head -1)
          YTLITE_BUNDLE=$(find "$YTLITE_EXTRACT" -name "YTLite.bundle" -type d | head -1)

          echo "✅ YTLite.dylib: $YTLITE_DYLIB"
          echo "✅ YTLite.bundle: $YTLITE_BUNDLE"

          if [[ -z "$YTLITE_DYLIB" ]]; then
            echo "❌ YTLite.dylib 추출 실패"
            exit 1
          fi

          # 보조 트윅 deb들
          DEBS=$(ls ${{ github.workspace }}/ready_packages/*.deb 2>/dev/null | tr '\n' ' ')
          if [[ -z "$DEBS" ]]; then
            echo "❌ 주입할 보조 트윅 .deb 파일이 없습니다!"
            exit 1
          fi

          # YTLite.dylib + YTLite.bundle + 보조 트윅 순서로 주입
          BUNDLE_ARG=""
          [[ -n "$YTLITE_BUNDLE" ]] && BUNDLE_ARG=""$YTLITE_BUNDLE""

          "$CYAN" \
            -i ./youtube.ipa \
            -o "${{ steps.meta.outputs.ipa_name }}" \
            -f "$YTLITE_DYLIB" $BUNDLE_ARG $DEBS \
            -n "${{ github.event.inputs.app_name }}" \
            -b "${{ github.event.inputs.bundle_id }}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          files: ${{ steps.meta.outputs.ipa_name }}
          overwrite_files: true
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
